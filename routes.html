<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUCK ZWIFT — Select Route</title>
    <meta name="description" content="Choose your cycling route and start riding.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .routes-grid { width:100%; max-width:580px; display:flex; flex-direction:column; gap:0.7rem; }
        .start-area { width:100%; max-width:580px; margin-top:1.5rem; }
        .route-stat .val.elev-color { color: var(--color-elevation); }
        .import-area { width:100%; max-width:580px; margin-top:1rem; }
        .drop-zone { border:2px dashed var(--border); border-radius:var(--radius-lg); padding:1.5rem; text-align:center; cursor:pointer; transition:all 0.2s; color:var(--text-muted); font-size:0.78rem; }
        .drop-zone:hover, .drop-zone.dragover { border-color:var(--primary); color:var(--primary); background:var(--primary-dim); }
        .drop-zone input { display:none; }
        .delete-btn { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:0.7rem; padding:0.3rem 0.5rem; border-radius:6px; transition:all 0.2s; }
        .delete-btn:hover { color:#EF4444; background:rgba(239,68,68,0.1); }
    </style>
</head>
<body class="with-mountains">
    <div class="page">
        <div class="brand-header">
            <h1 class="brand-title">FUCK ZWIFT</h1>
            <p class="brand-subtitle">Select your route</p>
        </div>

        <div class="routes-grid" id="routesList"></div>

        <!-- Import GPX -->
        <div class="import-area">
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('gpxInput').click()">
                📂 Trascina un file GPX qui, o clicca per selezionare
                <input type="file" id="gpxInput" accept=".gpx">
            </div>
        </div>

        <div class="start-area">
            <button class="btn btn-primary btn-full disabled" id="startBtn" onclick="window._startRide()">Start Ride →</button>
            <div style="text-align:center;margin-top:0.8rem;">
                <a class="back-link" href="index.html">← Back to home</a>
            </div>
        </div>
    </div>

    <!-- Bottom nav -->
    <nav class="bottom-nav">
        <div class="bottom-nav-inner">
            <a class="bottom-nav-item" href="index.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Home
            </a>
            <a class="bottom-nav-item active" href="routes.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-8"/><path d="M17 7h4v4"/></svg>
                Routes
            </a>
            <a class="bottom-nav-item" href="history.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                History
            </a>
            <a class="bottom-nav-item" href="profile.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Profile
            </a>
        </div>
    </nav>

    <script type="module">
        import { listRoutes, importRoute, deleteRoute, getRoute } from './js/storage/routes.js';
        import { ensureDefaultRoutes } from './js/data/default-routes.js';
        import { startRide } from './js/engine/ride.js';
        import { state } from './js/state.js';

        let selectedKey = null;

        await ensureDefaultRoutes();
        renderRoutes();

        async function renderRoutes() {
            const routes = await listRoutes();
            const list = document.getElementById('routesList');

            if (!routes.length) {
                list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🗺️</div>No routes yet. Import a GPX file below.</div>';
                return;
            }

            list.innerHTML = routes.map((r, i) => `
                <div class="card route-card stagger-${i+1}" id="card-${r.key}" onclick="window._selectRoute('${r.key}')">
                    <div class="route-header" style="display:flex;justify-content:space-between;align-items:center;">
                        <div>
                            <span class="route-emoji">${r.emoji}</span>
                            <span class="route-name">${r.name}</span>
                        </div>
                        <button class="delete-btn" onclick="event.stopPropagation(); window._deleteRoute('${r.key}')" title="Delete">🗑</button>
                    </div>
                    <div class="route-desc">${r.description}</div>
                    <div class="route-stats">
                        <div class="route-stat"><div class="val">${r.distance_km}</div><div class="lbl">km</div></div>
                        <div class="route-stat"><div class="val elev-color">${r.elevation_gain}</div><div class="lbl">m elevation</div></div>
                    </div>
                </div>
            `).join('');
        }

        window._selectRoute = function(key) {
            document.querySelectorAll('.route-card').forEach(c => c.classList.remove('selected'));
            document.getElementById('card-' + key).classList.add('selected');
            selectedKey = key;
            document.getElementById('startBtn').classList.remove('disabled');
        };

        window._startRide = async function() {
            if (!selectedKey) return;
            const route = await getRoute(selectedKey);
            if (!route) return;
            // Store selected route for ride.html
            sessionStorage.setItem('fz_selected_route', JSON.stringify(route));
            window.location.href = 'ride.html';
        };

        window._deleteRoute = async function(key) {
            if (!confirm('Delete this route?')) return;
            await deleteRoute(key);
            if (selectedKey === key) selectedKey = null;
            renderRoutes();
        };

        // Drag & drop + file input
        const dropZone = document.getElementById('dropZone');
        const gpxInput = document.getElementById('gpxInput');

        gpxInput.addEventListener('change', async (e) => {
            for (const file of e.target.files) await handleGPXFile(file);
            gpxInput.value = '';
        });

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', async (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            for (const file of e.dataTransfer.files) {
                if (file.name.endsWith('.gpx')) await handleGPXFile(file);
            }
        });

        async function handleGPXFile(file) {
            try {
                await importRoute(file);
                renderRoutes();
            } catch (err) {
                alert('Error importing GPX: ' + err.message);
            }
        }
    </script>
</body>
</html>
