<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNCHAINED PROJECT — Select Route</title>
    <meta name="description" content="Choose your cycling route and start riding on UNCHAINED PROJECT.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .routes-grid {
            width: 100%;
            max-width: 580px;
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }
        .start-area {
            width: 100%;
            max-width: 580px;
            margin-top: 1.5rem;
        }
        .route-stat .val.elev-color {
            color: var(--color-elevation);
        }
    </style>
</head>

<body class="with-mountains">

    <div class="page">
        <div class="brand-header">
            <h1 class="brand-title">UNCHAINED PROJECT</h1>
            <p class="brand-subtitle">Select your route</p>
        </div>

        <div class="routes-grid">
            {% for r in routes %}
            <div class="card route-card stagger-{{ loop.index }}" id="card-{{ r.key }}" onclick="selectRoute('{{ r.key }}')">
                <div class="route-header">
                    <span class="route-emoji">{{ r.emoji }}</span>
                    <span class="route-name">{{ r.name }}</span>
                </div>
                <div class="route-desc">{{ r.description }}</div>
                <div class="route-stats">
                    <div class="route-stat">
                        <div class="val">{{ r.distance_km }}</div>
                        <div class="lbl">km</div>
                    </div>
                    <div class="route-stat">
                        <div class="val elev-color">{{ r.elevation_gain }}</div>
                        <div class="lbl">m elevation</div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="start-area">
            <button class="btn btn-primary btn-full disabled" id="startBtn" onclick="startRide()">Start Ride →</button>
            <div style="text-align:center;margin-top:0.8rem;">
                <a class="back-link" href="/">← Back to home</a>
            </div>
        </div>
    </div>

    <!-- Bottom nav -->
    <nav class="bottom-nav">
        <div class="bottom-nav-inner">
            <a class="bottom-nav-item" href="/">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Home
            </a>
            <a class="bottom-nav-item active" href="/routes">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-8"/><path d="M17 7h4v4"/></svg>
                Routes
            </a>
            <a class="bottom-nav-item" href="/history">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                History
            </a>
            <a class="bottom-nav-item" href="/profile">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Profile
            </a>
        </div>
    </nav>

    <script>
        let selectedKey = null;
        function selectRoute(key) {
            document.querySelectorAll('.route-card').forEach(c => c.classList.remove('selected'));
            document.getElementById('card-' + key).classList.add('selected');
            selectedKey = key;
            fetch('/route/select', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ route: key })
            }).then(() => {
                document.getElementById('startBtn').classList.remove('disabled');
            });
        }
        function startRide() {
            if (!selectedKey) return;
            fetch('/ride/start', { method: 'POST' }).then(() => {
                window.location.href = '/ride';
            });
        }
    </script>
</body>

</html>
