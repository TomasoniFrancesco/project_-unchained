# UNCHAINED PROJECT — Configuration
# Copy this file to config.toml and edit to your needs.
# All values shown are the defaults.

[server]
host = "0.0.0.0"
port = 5050
debug = false

[paths]
# Base directory for all user data (routes, activities, exports, profile).
# Relative paths are resolved from the project root.
data_dir = "./data"

[ble]
# BLE scan duration in seconds
scan_timeout = 8
# Skip trainer requirement for UI access (useful for development)
bypass_connection = true
# Keywords used to auto-detect trainers by name during BLE scan
trainer_keywords = ["trainer", "bike", "ftms", "tacx", "wahoo", "elite", "van rysel", "kickr", "neo", "flux", "direto"]
# Keywords used to auto-detect controllers by name during BLE scan
controller_keywords = ["zwift", "click", "play"]

[strava]
# Get these from https://www.strava.com/settings/api
# Can also be set via STRAVA_CLIENT_ID and STRAVA_CLIENT_SECRET env vars.
client_id = ""
client_secret = ""

[gear]
# Total number of virtual gears. 21 is the recommended default because it gives
# a true neutral middle gear when min/max are symmetric.
count = 21
# Neutral gear (0-indexed, this gear = 1.0x trainer gradient feel)
neutral = 10
# Legacy compatibility knob for older configs
step_grade = 0.5
# Highest gear gradient feel scale
max_difficulty_scale = 3.0
# Debounce between shifts (milliseconds)
debounce_ms = 200
# Smoothing factor for gear transitions (0 = frozen, 1 = instant)
smoothing = 0.3
# Lowest gear gradient feel scale (0 = flat, 1 = full gradient)
min_difficulty_scale = 0.15
# Downhill feel multiplier to avoid excessive spin-out
downhill_scale = 0.5
# Seconds to ramp trainer resistance from flat at ride start
startup_resistance_ramp_s = 12.0
# Lowest gear trainer grade offset (%). Gear 1 maps exactly to this value.
roller_min_grade = -10.0
# Highest gear trainer grade offset (%). Final gear maps exactly to this value.
roller_max_grade = 10.0

[physics]
# Default rider + bike mass in kg (overridden by profile weight if set)
rider_mass = 80.0
# Rolling resistance coefficient
crr = 0.005
# Drag area in m² (road bike, hoods position)
cda = 0.4
# Slope smoothing factor (EMA alpha, 0 = frozen, 1 = instant)
slope_smoothing = 0.25
# Max slope change rate (%/second)
max_slope_rate = 2.0
